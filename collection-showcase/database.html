    <meta charset="utf-8" />

    <!-- Bootstrap CSS v5.3.8 -->

        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
    <canvas id="canvas"></canvas>
    <nav class="container d-flex justify-content-between p-5" id="navbar">
        <ul class="nav gap-5">
            <a href="index.html" class="nav-animate">
                <div class="d-flex gap-2"><img src="/images/home.png" class="img-fluid svg">
                    <li class="nav-item fs-2">Home</li>
                </div>
            </a>
            <a href="database.html" class="nav-animate">
                <div class="d-flex gap-2"><img src="/images/data.png" class="img-fluid svg">
                    <li class="nav-item fs-2">Database</li>
                </div>
            </a>
            <a href="about.html" class="nav-animate">
                <div class="d-flex gap-2"><img src="/images/huh.png" class="img-fluid svg">
                    <li class="nav-item fs-2">About</li>
                </div>
            </a>
        </ul>
    </nav>
    <div class="d-flex justify-content-center gap-5">
        <h1 class="main-text fadeInUpAnimate text-center data-text" id="hero-title">BRAIN-<span
                class="highlight-orange data-text">ROTS</span>
        </h1>
        <div class="filter-rarity">
            <label for="rarity-select" class="form-label fs-5 highlight-light-red fw-bold">Filter by Rarity:</label>
            <select id="rarity-select" class="form-select text-center fs-4">
                <option value="all">All</option>
                <option value="common">Common</option>
                <option value="rare">Rare</option>
                <option value="epic">Epic</option>
                <option value="legendary">Legendary</option>
            </select>
        </div>
        <div class="filter-keyword">
            <label for="keyword-input" class="form-label fs-5 highlight-light-red fw-bold">Filter by Keyword:</label>
            <input type="text" id="keyword-input" class="form-control fs-4" placeholder="Enter keyword" />
        </div>
    </div>

    <main class="container d-flex flex-column align-items-center p-5" id="render"></main>

    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
